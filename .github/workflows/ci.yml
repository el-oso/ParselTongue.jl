name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel in-progress runs for the same ref when new commits arrive.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.12']
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@v3

      # On Windows, MinGW-w64 is pre-installed at C:\msys64\mingw64\bin but is not
      # on PATH. Add it so that _find_cc() finds gcc and objdump is available for
      # slim-wheel DLL BFS.
      - name: Set up MinGW-w64 (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"

      # numpy is optional (array returns fall back to memoryview without it),
      # but the integration test exercises the numpy path when it is available.
      # Install via pip (matching macOS/Windows below) so numpy is built for the
      # exact runner Python. apt's python3-numpy can be ABI-mismatched with a
      # newer system Python and segfaults when imported in the embedded interpreter.
      - name: Install Python extras (Linux)
        if: runner.os == 'Linux'
        run: pip3 install numpy --break-system-packages

      - name: Install Python extras (macOS)
        if: runner.os == 'macOS'
        run: pip3 install numpy --break-system-packages

      - name: Install Python extras (Windows)
        if: runner.os == 'Windows'
        run: pip install numpy

      - name: Instantiate
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'

      # Run the fast build-free unit tests first for quick feedback.
      # If these fail, the integration build step below is skipped automatically.
      - name: Unit tests (boundary types, macros, codegen — no build tools needed)
        run: julia --project=. test/test_m2_boundary_macros.jl

      # Full integration: juliac --trim build + Python import in a subprocess.
      # Skips gracefully when juliac / python3 / cc are unavailable (see _have_tools).
      - name: Integration tests (juliac build + Python import)
        run: julia --project=. test/test_integration.jl

  # Doctest gate: runs only the docstring doctests via Documenter.doctest — no
  # page build, no Vitepress/npm, no deploy. OS-independent, so a single runner.
  # The full docs build (with Vitepress) runs separately in Documentation.yml.
  doctests:
    name: Doctests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - name: Instantiate docs project
        run: julia --project=docs -e 'using Pkg; Pkg.instantiate()'
      - name: Run doctests
        run: julia --project=docs docs/doctests.jl

  # Diagnostic (non-blocking): the Linux integration job intermittently SIGSEGVs
  # in the embedded-Julia↔CPython subprocess. It only reproduces with the FULL
  # feature script (handles/dunders/@pymutable/iterators), so this job builds the
  # `feature` extension once and loops test/fixtures/feature_script.py under gdb
  # until it crashes, capturing the native backtrace (Julia's own SIGSEGV handler
  # otherwise preempts Python's faulthandler, hiding the line).
  segfault-diag:
    name: Segfault diagnosis (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - name: Install gdb + numpy
        run: |
          sudo apt-get update -q && sudo apt-get install -y gdb
          pip3 install numpy --break-system-packages
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Build feature extension
        run: |
          mkdir -p "$RUNNER_TEMP/featdiag"
          julia --project=. -e 'using ParselTongue; build_extension("test/fixtures/feature.jl"; outdir=ENV["RUNNER_TEMP"]*"/featdiag")'
          ls -la "$RUNNER_TEMP/featdiag"
      - name: Loop full script under gdb until it crashes
        continue-on-error: true
        env:
          # Let gdb auto-download CPython (and glibc) debug symbols so the
          # stripped `?? ()` frames in the python3 binary resolve to real
          # function names — pinpointing the exact corrupted/crashing call.
          DEBUGINFOD_URLS: "https://debuginfod.ubuntu.com"
        run: |
          export FEATURE_DIR="$RUNNER_TEMP/featdiag"
          # Enable debuginfod up front (in .gdbinit) so the first-use confirmation
          # prompt — auto-answered "no" in batch mode — never blocks symbol loading.
          mkdir -p "$HOME"
          printf 'set debuginfod enabled on\n' > "$HOME/.gdbinit"
          python3 -c "import sys; print('running python:', sys.executable, sys.version)"
          crashed=0
          for i in $(seq 1 40); do
            gdb -batch \
              -iex 'set debuginfod enabled on' \
              -ex 'set pagination off' \
              -ex 'run' \
              -ex 'echo \n===== CRASH BACKTRACE (bt full) =====\n' \
              -ex 'bt full' \
              -ex 'echo \n===== ALL THREADS =====\n' \
              -ex 'thread apply all bt' \
              --args python3 test/fixtures/feature_script.py > "gdb_$i.log" 2>&1
            if grep -qE "SIGSEGV|Segmentation fault" "gdb_$i.log"; then
              echo "===== CRASH on iteration $i ====="
              cat "gdb_$i.log"
              crashed=1
              break
            fi
            echo "iter $i: clean ($(grep -c FEATURE_OK "gdb_$i.log") FEATURE_OK)"
          done
          [ "$crashed" = 0 ] && echo "No crash captured in 40 iterations (crash rate is low or env-dependent)."
          exit 0

  # Memory-safety gate for the generated C glue. Compiles the shim (no Julia
  # linked — pt_* are stubbed) with AddressSanitizer and runs the marshalling
  # paths; a leak/overflow in the glue (e.g. a reverted A1/A2 fix) fails here.
  asan-glue:
    name: ASan C-glue gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - name: Install Python dev headers
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-dev
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: ASan glue gate
        run: bash test/asan/run.sh
